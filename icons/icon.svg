<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#FF7E7E"/>
      <stop offset="1" stop-color="#FF4FA3"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background so the icon survives any maskable crop -->
  <rect width="200" height="200" fill="url(#bg)"/>

  <!-- Sparkles: a nod to "mix & match / make your own" (kept in the safe zone) -->
  <g fill="#FFF3C4">
    <path d="M52 60 q3 -10 6 0 q10 3 0 6 q-3 10 -6 0 q-10 -3 0 -6 Z"/>
    <path d="M150 54 q2.4 -8 4.8 0 q8 2.4 0 4.8 q-2.4 8 -4.8 0 q-8 -2.4 0 -4.8 Z"/>
  </g>

  <!-- Face -->
  <circle cx="100" cy="102" r="62" fill="#FFD93D" stroke="#2D2D2D" stroke-width="6"/>

  <!-- Rosy cheeks -->
  <g fill="#FF8FB1" opacity="0.65">
    <circle cx="70" cy="112" r="9"/>
    <circle cx="130" cy="112" r="9"/>
  </g>

  <!-- Eyes (with highlights) -->
  <g fill="#2D2D2D">
    <circle cx="79" cy="90" r="11"/>
    <circle cx="121" cy="90" r="11"/>
  </g>
  <g fill="#FFFFFF">
    <circle cx="83" cy="86" r="3.6"/>
    <circle cx="125" cy="86" r="3.6"/>
  </g>

  <!-- Big open grin with a peeking tongue -->
  <path d="M68 118 Q100 128 132 118 Q127 154 100 154 Q73 154 68 118 Z" fill="#2D2D2D"/>
  <path d="M83 146 Q100 139 117 146 Q117 155 100 155 Q83 155 83 146 Z" fill="#FF6B6B"/>
</svg>
