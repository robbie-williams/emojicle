<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Emojicle">
  <meta name="theme-color" content="#FF5A5F">
  <title>Emojicle</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="vendor/bulma.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Emojicle</h1>
    <p class="app-tagline">Make your emoji!</p>
  </header>

  <main class="app-main">
    <section class="canvas-card">
      <div class="canvas-wrap">
        <svg id="emoji-svg" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Your custom emoji">
          <g id="dance-group">
            <g id="layer-arms"></g>
            <g id="layer-face"></g>
            <g id="layer-eyebrows"></g>
            <g id="layer-eyes"></g>
            <g id="layer-nose"></g>
            <g id="layer-mouth"></g>
            <g id="layer-extras"></g>
            <rect id="select-box" class="select-box" rx="3" ry="3" fill="none"
                  pointer-events="none" visibility="hidden"></rect>
          </g>
        </svg>
      </div>
    </section>

    <section class="controls-card">
      <div class="controls" id="controls"></div>
    </section>

    <div class="actions columns is-mobile is-gapless">
      <div class="column">
        <button id="btn-random" class="button is-rounded btn-action btn-random" aria-label="Randomise emoji">
          <span class="btn-icon" aria-hidden="true">&#x1F3B2;</span>
          <span>Random</span>
        </button>
      </div>
      <div class="column">
        <button id="btn-dance" class="button is-rounded btn-action btn-dance" aria-label="Make the emoji dance">
          <span class="btn-icon" aria-hidden="true">&#x1F483;</span>
          <span>Dance</span>
        </button>
      </div>
      <div class="column">
        <button id="btn-share" class="button is-rounded btn-action btn-share" aria-label="Share or save your emoji">
          <span class="btn-icon" aria-hidden="true">&#x1F4E4;</span>
          <span>Send</span>
        </button>
      </div>
    </div>

    <div class="share-opts">
      <label class="link-toggle">
        <input type="checkbox" id="opt-link">
        <span>Share with link</span>
      </label>
    </div>
  </main>

  <footer class="app-credit">
    Emoji art by <a href="https://openmoji.org" target="_blank" rel="noopener">OpenMoji</a>
    &middot; licensed <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">CC BY-SA 4.0</a>
  </footer>

  <div id="picker" class="picker" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="picker-panel">
      <div class="picker-head">
        <h2 id="picker-title" class="picker-title"></h2>
        <button id="picker-close" class="picker-close" aria-label="Close picker">&times;</button>
      </div>
      <div id="picker-grid" class="picker-grid"></div>
    </div>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="parts-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
